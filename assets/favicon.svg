<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Black hole">
  <rect width="32" height="32" fill="#ffd166"/>
  <!-- accretion ring -->
  <ellipse cx="16" cy="16" rx="12" ry="12" fill="none" stroke="#ff784f" stroke-width="3.4"/>
  <ellipse cx="16" cy="16" rx="12" ry="4.4" fill="none" stroke="#0081a7" stroke-width="1.8" opacity="0.9"/>
  <!-- event horizon -->
  <circle cx="16" cy="16" r="7" fill="#3a3042"/>
</svg>
